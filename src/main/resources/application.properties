# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/car_dealership}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:car_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:car123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidation2024CarDealershipMustBeAtLeast32Chars!}
jwt.expiration=${JWT_EXPIRATION:604800000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:DEBUG}
logging.level.com.Shubham.carDealership=${LOG_LEVEL_APP:DEBUG}

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo
openai.max-tokens=500
openai.temperature=0.7

# ML Services Configuration (Environment variables override these)
ml.carrecognition.url=${ML_CARRECOGNITION_URL:http://localhost:5002}
ml.carrecognition.enabled=true

ml.tradein.url=${ML_TRADEIN_URL:http://localhost:5003}
ml.tradein.enabled=true