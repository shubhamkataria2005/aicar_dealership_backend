# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/car_dealership
spring.datasource.username=car_user
spring.datasource.password=car123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidation2024CarDealershipMustBeAtLeast32Chars!
jwt.expiration=604800000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.Shubham.carDealership=DEBUG

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-3.5-turbo
openai.max-tokens=500
openai.temperature=0.7

# ML Model Configuration
ml.models.base=src/main/resources/models/
ml.tradein.model=${ml.models.base}tradein_model_package/

# Car Recognition ML Service Configuration
ml.carrecognition.url=http://localhost:5002
ml.carrecognition.enabled=true

# Trade-In ML Service Configuration
ml.tradein.url=http://localhost:5003
ml.tradein.enabled=true